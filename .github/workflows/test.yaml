name: Test
on:
  push:
    branches: ["master"]
jobs:
  build:
    name: CI Test
    runs-on: ubuntu-latest
    steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Build
      run: |
        go build -o eseparser bin/*.go

    - name: Test
      shell: bash
      if: always()
      run: |
        go test -v ./...

    - name: Store Artifacts
      shell: bash
      if: ${{ ! success() }}
      run: |
        go test -v -update

    - uses: actions/upload-artifact@master
      if: ${{ ! success() }}
      with:
        name: fixtures
        path: fixtures
